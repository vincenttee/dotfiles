# =============================================================================
# General Settings
# =============================================================================
set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc" # Truecolor support

set -sg escape-time 0             # remove delay after pressing Esc
set -g focus-events on            # pass focus events to applications (like Vim)
set -g history-limit 10000        # increase scrollback buffer
set -g mouse on                   # enable mouse support
set -g extended-keys on           # enable extended key support
set -s extended-keys-format csi-u # use modern csi-u format for extended keys

# Bell & Activity Monitoring
set -g monitor-bell on          # monitor for bell in all windows
set -g monitor-activity on      # monitor for activity in all windows
set -g bell-action any          # any window can trigger a bell
set -g visual-bell off          # don't show a message or flash
set -g visual-activity off      # don't show a message or flash

set-option -g base-index 1      # start window numbering at 1
set-option -g renumber-windows on # renumber windows when one is closed
set-option -g repeat-time 500   # repeat time limit (ms)
set-option -g status-keys vi    # use vi keys in status line

# =============================================================================
# Key Bindings
# =============================================================================
unbind-key c-b
set-option -g prefix c-a        # change prefix to Ctrl-a

# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded config!"

# Window/Pane management
bind-key c new-window -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -c "#{pane_current_path}"
bind-key space if-shell '[ $(tmux display-message -p "#{pane_height}") -gt $(expr $(tmux display-message -p "#{window_height}") \* 55 / 100) ]' \
    'resize-pane -y 20%' \
    'resize-pane -y 80%'

# Navigation (Vim-style)
bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U
bind-key tab select-pane -t :.+
bind-key btab select-pane -t :.-

# Layout navigation
bind-key n next-layout
bind-key p previous-layout

# Window navigation (for Ghostty/Cmd-Shift-[] compatibility)
bind-key C-p previous-window
bind-key C-n next-window

# Session navigation (Shift+Option+[] compatibility)
bind-key -n 'M-{' switch-client -p
bind-key -n 'M-}' switch-client -n

# Direct window jumping (Option+1..9)
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Moving windows
bind-key -r > swap-window -t :+
bind-key -r < swap-window -t :-

# Resizing panes
bind-key J resize-pane -D 3
bind-key K resize-pane -U 3
bind-key H resize-pane -L 3
bind-key L resize-pane -R 3

# Miscellaneous
bind-key * set-window-option synchronize-panes
bind-key C-l send-keys C-l \; clear-history \; display-message "Cleared!"

# =============================================================================
# Copy Mode (Vim-style)
# =============================================================================
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "tr -d '\n' | pbcopy"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# =============================================================================
# UI & Decorations
# =============================================================================
set -g pane-border-status top
set -g pane-border-format "[#P: #{pane_current_command}]"
set-option -g pane-active-border-style fg=colour214 # Gruvbox Yellow
set-option -g pane-border-style fg=colour239        # Gruvbox Dark Grey

set-option -g status-interval 10
set-option -g status-justify left
set-option -g window-status-separator ""

# Status Bar Colors
set-option -g status-bg colour236
set-option -g status-fg colour223
set-option -g status-style bg=colour236,fg=colour223

# Default Window Style (Inactive)
set-window-option -g window-status-style fg=colour214,bg=colour237
set-window-option -g window-status-format " #I #[fg=colour223,bg=colour239] #W#{?#{||:#{window_activity_flag},#{window_bell_flag}},#[fg=colour109] •, } "

# Active Window Style
set-window-option -g window-status-current-style fg=colour236,bg=colour214,bold
set-window-option -g window-status-current-format " #I #[fg=colour223,bg=colour239,bold] #W (#{window_panes}) "

# Alert Styles (Bell & Activity)
# Set to none so they don't override the format colors
set-window-option -g window-status-bell-style none
set-window-option -g window-status-activity-style none

set-option -g status-left-length 40
set-option -g status-left '#[bold]#{?client_prefix,#[fg=colour214] PREFIX  ,#[fg=colour109] #S }'
set-option -g status-right-length 100
set-option -g status-right '#[bg=colour238,fg=colour223] #(cache="/tmp/tmux_weather.txt"; if [ ! -f "$cache" ] || [ $(find "$cache" -mmin +15) ]; then curl -s "wttr.in/${WEATHER_LOCATION:-}?format=%%t+%%c" --max-time 2 > "$cache" || echo "🌈" > "$cache"; fi; cat "$cache") #[bg=colour108,fg=colour236,bold] %a %d %b %H:%M '

# =============================================================================
# Integrations (FZF & External)
# =============================================================================
# Tmux completion
bind-key -n 'M-t' run "tmux split-window -p 40 'tmux send-keys -t #{pane_id} \"$(tmuxwords.rb --all --scroll 1000 --min 5 | fzf --multi | paste -sd\\  -)\"'"

# fzf-locate (all)
bind-key -n 'M-`' run "tmux split-window -p 40 'tmux send-keys -t #{pane_id} \"$(locate / | fzf -m | paste -sd\\  -)\"'"

# Capture pane and open in Vim
bind-key C-o run 'tmux capture-pane -S -102400 -p > /tmp/tmux-capture.txt'\;\
             new-window "view /tmp/tmux-capture.txt"

# =============================================================================
# Messages
# =============================================================================
set -g message-style fg=colour214,bg=colour239,bold
set -g display-time 3000

# =============================================================================
# Plugins (via TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
run-shell '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
